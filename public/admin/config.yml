backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: public/assets/uploads
public_folder: /assets/uploads

site_url: https://zionedu.netlify.app
display_url: https://zionedu.netlify.app
logo_url: /favicon.svg

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: false

collections:
  - name: home
    label: Home
    files:
      - name: home
        label: Home Page
        file: src/data/home.json
        format: json
        fields:
          - label: Page Meta
            name: page
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
              - { label: Background Image, name: backgroundImage, widget: image, allow_multiple: false }
              - label: Buttons
                name: buttons
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Show Button, name: enabled, widget: boolean, default: true }
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
                  - { label: Style, name: style, widget: select, options: [primary, light] }
              - label: Slider Controls
                name: controls
                widget: object
                fields:
                  - { label: Show Controls, name: enabled, widget: boolean, default: true }
                  - { label: Aria Label, name: ariaLabel, widget: string }
                  - { label: Previous Label, name: previousLabel, widget: string }
                  - { label: Next Label, name: nextLabel, widget: string }
                  - { label: Previous Icon/Text, name: previousText, widget: string }
                  - { label: Next Icon/Text, name: nextText, widget: string }
              - { label: Statistics Label, name: statisticsLabel, widget: string, required: false }
              - { label: Highlights Label, name: highlightsLabel, widget: string, required: false }
              - label: Highlights
                name: highlights
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: Show Highlight, name: enabled, widget: boolean, default: true }
                  - { label: Title, name: title, widget: string }
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Image, name: image, widget: image, allow_multiple: false }
                  - { label: Alt Text, name: alt, widget: string }
          - label: About Section
            name: about
            widget: object
            fields: &image_text_section_fields
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
              - label: Image
                name: image
                widget: object
                required: false
                fields:
                  - { label: Image, name: src, widget: image, allow_multiple: false, required: false }
                  - { label: Alt Text, name: alt, widget: string, required: false }
              - label: Buttons
                name: buttons
                widget: list
                required: false
                summary: "{{fields.label}}"
                fields: &button_fields
                  - { label: Show Button, name: enabled, widget: boolean, default: true }
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
                  - { label: Style, name: style, widget: select, options: [primary, light] }
          - label: Features Intro
            name: features
            widget: object
            fields: &intro_section_fields
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
          - label: Courses Intro
            name: courses
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Item Limit, name: limit, widget: number, value_type: int, min: 1, required: false }
          - label: Statistics
            name: statistics
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
          - label: Staff Intro
            name: staff
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Item Limit, name: limit, widget: number, value_type: int, min: 1, required: false }
          - label: Testimonials Intro
            name: testimonials
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Aria Label, name: ariaLabel, widget: string, required: false }
          - label: Gallery Intro
            name: gallery
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Item Limit, name: limit, widget: number, value_type: int, min: 1, required: false }
          - label: Events Intro
            name: events
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Item Limit, name: limit, widget: number, value_type: int, min: 1, required: false }
          - label: CTA
            name: cta
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
              - label: Buttons
                name: buttons
                widget: list
                summary: "{{fields.label}}"
                fields: *button_fields

  - name: about
    label: About
    files:
      - name: about
        label: About Page
        file: src/data/about.json
        format: json
        fields:
          - label: Page Meta
            name: page
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields: *intro_section_fields
          - label: Story
            name: story
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - label: Image
                name: image
                widget: object
                fields:
                  - { label: Image, name: src, widget: image, allow_multiple: false }
                  - { label: Alt Text, name: alt, widget: string }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
              - { label: Body, name: body, widget: text }
          - label: Statistics
            name: statistics
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
          - label: Features
            name: features
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
          - label: CTA
            name: cta
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }

  - name: navigation
    label: Navigation
    files:
      - name: navigation
        label: Main Navigation
        file: src/data/navigation.json
        format: json
        fields:
          - label: Links
            name: items
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Show Link, name: enabled, widget: boolean, default: true }
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
              - { label: Icon, name: icon, widget: string, required: false }

  - name: footer
    label: Footer
    files:
      - name: footer
        label: Footer
        file: src/data/footer.json
        format: json
        fields:
          - { label: Show Footer, name: enabled, widget: boolean, default: true }
          - label: Brand
            name: brand
            widget: object
            fields:
              - { label: Show Brand, name: enabled, widget: boolean, default: true }
              - { label: Show Tagline, name: showTagline, widget: boolean, default: true }
          - label: Columns
            name: columns
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Show Column, name: enabled, widget: boolean, default: true }
              - { label: Title, name: title, widget: string }
              - { label: Type, name: type, widget: select, options: [navigation, contact, social, custom] }
              - label: Contact Items
                name: items
                widget: list
                required: false
                summary: "{{fields.field}}"
                fields:
                  - { label: Show Item, name: enabled, widget: boolean, default: true }
                  - { label: Site Field, name: field, widget: select, options: [address, email, phone, hours] }
              - label: Custom Links
                name: links
                widget: list
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: Show Link, name: enabled, widget: boolean, default: true }
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Copyright
            name: copyright
            widget: object
            fields:
              - { label: Show Copyright, name: enabled, widget: boolean, default: true }
              - { label: Prefix, name: prefix, widget: string, required: false }
              - { label: Text, name: text, widget: string }

  - name: contact
    label: Contact
    files:
      - name: contact
        label: Contact Page
        file: src/data/contact.json
        format: json
        fields:
          - label: Page Meta
            name: page
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields: *intro_section_fields
          - label: Contact Details Display
            name: contact
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Office Title, name: officeTitle, widget: string }
              - { label: Show Address, name: showAddress, widget: boolean, default: true }
              - { label: Show Email, name: showEmail, widget: boolean, default: true }
              - { label: Show Phone, name: showPhone, widget: boolean, default: true }
              - { label: Show Hours, name: showHours, widget: boolean, default: true }
          - label: Form
            name: form
            widget: object
            fields:
              - { label: Show Form, name: enabled, widget: boolean, default: true }
              - { label: Action URL, name: action, widget: string }
              - { label: Method, name: method, widget: select, options: [post, get] }
              - { label: Submit Label, name: submitLabel, widget: string }
              - label: Fields
                name: fields
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Show Field, name: enabled, widget: boolean, default: true }
                  - { label: Label, name: label, widget: string }
                  - { label: Name, name: name, widget: string }
                  - { label: Type, name: type, widget: select, options: [text, email, tel, select, textarea] }
                  - { label: Autocomplete, name: autocomplete, widget: string, required: false }
                  - { label: Required, name: required, widget: boolean, default: false }
                  - { label: Rows, name: rows, widget: number, value_type: int, required: false }
                  - { label: Options, name: options, widget: list, required: false, field: { label: Option, name: option, widget: string } }

  - name: courses
    label: Courses
    files:
      - name: courses_content
        label: Course Cards
        file: src/data/courses.json
        format: json
        fields:
          - { label: Show Courses, name: enabled, widget: boolean, default: true }
          - label: Courses
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Show Course, name: enabled, widget: boolean, default: true }
              - { label: Title, name: title, widget: string }
              - { label: Level, name: level, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Image, name: image, widget: image, allow_multiple: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
      - name: courses_page
        label: Courses Page Text
        file: src/data/pages.json
        format: json
        fields:
          - label: Courses Page
            name: courses
            widget: object
            fields: &subpage_fields
              - label: Page Meta
                name: page
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: Hero
                name: hero
                widget: object
                fields: *intro_section_fields
              - label: Section Intro
                name: courses
                widget: object
                required: false
                fields: *intro_section_fields
              - label: Events Intro
                name: events
                widget: object
                required: false
                fields: *intro_section_fields
              - label: Gallery Intro
                name: gallery
                widget: object
                required: false
                fields: *intro_section_fields
              - label: Staff Intro
                name: staff
                widget: object
                required: false
                fields: *intro_section_fields
              - label: CTA
                name: cta
                widget: object
                fields:
                  - { label: Show Section, name: enabled, widget: boolean, default: true }

  - name: events
    label: Events
    files:
      - name: events_content
        label: Event Cards
        file: src/data/events.json
        format: json
        fields:
          - { label: Show Events, name: enabled, widget: boolean, default: true }
          - label: Events
            name: items
            widget: list
            summary: "{{fields.title}} - {{fields.date}}"
            fields:
              - { label: Show Event, name: enabled, widget: boolean, default: true }
              - { label: Title, name: title, widget: string }
              - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
              - { label: Time, name: time, widget: string, required: false }
              - { label: Location, name: location, widget: string, required: false }
              - { label: Description, name: description, widget: text }
      - name: events_page
        label: Events Page Text
        file: src/data/pages.json
        format: json
        fields:
          - label: Events Page
            name: events
            widget: object
            fields: *subpage_fields

  - name: gallery
    label: Gallery
    files:
      - name: gallery_content
        label: Gallery Images
        file: src/data/gallery.json
        format: json
        fields:
          - { label: Show Gallery, name: enabled, widget: boolean, default: true }
          - label: Images
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Show Image, name: enabled, widget: boolean, default: true }
              - { label: Title, name: title, widget: string }
              - { label: Image, name: image, widget: image, allow_multiple: false }
              - { label: Alt Text, name: alt, widget: string }
      - name: gallery_page
        label: Gallery Page Text
        file: src/data/pages.json
        format: json
        fields:
          - label: Gallery Page
            name: gallery
            widget: object
            fields: *subpage_fields

  - name: staff
    label: Staff
    files:
      - name: staff_content
        label: Staff Profiles
        file: src/data/staff.json
        format: json
        fields:
          - { label: Show Staff, name: enabled, widget: boolean, default: true }
          - label: Staff Members
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Show Profile, name: enabled, widget: boolean, default: true }
              - { label: Name, name: name, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Bio, name: bio, widget: text }
              - { label: Image, name: image, widget: image, allow_multiple: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
      - name: teachers_page
        label: Teachers Page Text
        file: src/data/pages.json
        format: json
        fields:
          - label: Teachers Page
            name: teachers
            widget: object
            fields: *subpage_fields

  - name: testimonials
    label: Testimonials
    files:
      - name: testimonials
        label: Testimonials
        file: src/data/testimonials.json
        format: json
        fields:
          - { label: Show Testimonials, name: enabled, widget: boolean, default: true }
          - label: Testimonials
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Show Testimonial, name: enabled, widget: boolean, default: true }
              - { label: Quote, name: quote, widget: text }
              - { label: Name, name: name, widget: string }
              - { label: Role, name: role, widget: string, required: false }

  - name: stats
    label: Stats
    files:
      - name: stats
        label: Statistics
        file: src/data/stats.json
        format: json
        fields:
          - { label: Show Statistics, name: enabled, widget: boolean, default: true }
          - label: Statistics
            name: items
            widget: list
            summary: "{{fields.value}} {{fields.label}}"
            fields:
              - { label: Show Statistic, name: enabled, widget: boolean, default: true }
              - { label: Value, name: value, widget: string }
              - { label: Label, name: label, widget: string }

  - name: theme
    label: Theme
    files:
      - name: site
        label: Site Identity, Contact, Social Links
        file: src/data/site.json
        format: json
        fields:
          - { label: School Name, name: schoolName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - label: Logo
            name: logo
            widget: object
            fields:
              - { label: Text Mark, name: text, widget: string, required: false }
              - { label: Logo Image, name: image, widget: image, allow_multiple: false, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
          - { label: Favicon, name: favicon, widget: image, allow_multiple: false, required: false }
          - label: Accessibility Labels
            name: labels
            widget: object
            fields:
              - { label: Skip Link, name: skipLink, widget: string }
              - { label: Toggle Navigation, name: toggleNavigation, widget: string }
              - { label: Main Navigation, name: mainNavigation, widget: string }
              - { label: School Statistics, name: schoolStatistics, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Phone, name: phone, widget: string }
          - { label: Address, name: address, widget: text }
          - { label: Hours, name: hours, widget: string }
          - label: Social Links
            name: social
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Show Link, name: enabled, widget: boolean, default: true }
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }
              - { label: Icon, name: icon, widget: string, required: false }
      - name: theme
        label: Colors, Layout, Shadows
        file: src/data/theme.json
        format: json
        fields:
          - label: Colors
            name: colors
            widget: object
            fields:
              - { label: Text, name: ink, widget: color }
              - { label: Muted Text, name: muted, widget: color }
              - { label: Lines, name: line, widget: color }
              - { label: Paper, name: paper, widget: color }
              - { label: Soft Background, name: soft, widget: color }
              - { label: Primary, name: primary, widget: color }
              - { label: Primary Dark, name: primaryDark, widget: color }
              - { label: Primary Deep, name: primaryDeep, widget: color }
              - { label: Secondary, name: secondary, widget: color }
              - { label: Accent, name: accent, widget: color }
              - { label: Highlight, name: highlight, widget: color }
              - { label: Navbar Background, name: navbarBackground, widget: color }
              - { label: Navbar Text, name: navbarText, widget: color }
              - { label: Footer Background, name: footerBackground, widget: color }
              - { label: Footer Text, name: footerText, widget: string }
              - { label: Button Primary Text, name: buttonPrimaryText, widget: color }
              - { label: Button Light Background, name: buttonLightBackground, widget: color }
              - { label: Button Light Text, name: buttonLightText, widget: color }
          - label: Layout
            name: layout
            widget: object
            fields:
              - { label: Border Radius, name: radius, widget: string }
              - { label: Container Width, name: container, widget: string }
          - label: Shadows
            name: shadows
            widget: object
            fields:
              - { label: Default Shadow, name: default, widget: string }
              - { label: Strong Shadow, name: strong, widget: string }
              - { label: Card Shadow, name: card, widget: string }
          - label: Hero Overlay
            name: heroOverlay
            widget: object
            fields:
              - { label: Start, name: start, widget: string }
              - { label: Middle, name: middle, widget: string }
              - { label: End, name: end, widget: string }
              - { label: Bottom, name: bottom, widget: string }

  - name: sections
    label: Sections
    files:
      - name: visibility
        label: Global Section Visibility
        file: src/data/sections.json
        format: json
        fields:
          - { label: Navbar, name: navbar, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Hero, name: hero, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: About, name: about, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Features, name: features, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Courses, name: courses, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Gallery, name: gallery, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Events, name: events, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Staff, name: staff, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Testimonials, name: testimonials, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Statistics, name: statistics, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: CTA, name: cta, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Contact, name: contact, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Footer, name: footer, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
      - name: feature_cards
        label: Feature Cards
        file: src/data/features.json
        format: json
        fields:
          - { label: Show Features, name: enabled, widget: boolean, default: true }
          - label: Features
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Show Feature, name: enabled, widget: boolean, default: true }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Icon, name: icon, widget: string, required: false }
